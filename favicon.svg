<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Drone arms (X shape) -->
  <line x1="16" y1="16" x2="48" y2="48" stroke="#E65100" stroke-width="5" stroke-linecap="round"/>
  <line x1="48" y1="16" x2="16" y2="48" stroke="#E65100" stroke-width="5" stroke-linecap="round"/>

  <!-- Propeller discs -->
  <circle cx="16" cy="16" r="8" fill="#388E3C"/>
  <circle cx="48" cy="16" r="8" fill="#388E3C"/>
  <circle cx="16" cy="48" r="8" fill="#388E3C"/>
  <circle cx="48" cy="48" r="8" fill="#388E3C"/>

  <!-- Propeller blades -->
  <line x1="11" y1="11" x2="21" y2="21" stroke="#A5D6A7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="21" y1="11" x2="11" y2="21" stroke="#A5D6A7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="11" x2="53" y2="21" stroke="#A5D6A7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="53" y1="11" x2="43" y2="21" stroke="#A5D6A7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="11" y1="43" x2="21" y2="53" stroke="#A5D6A7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="21" y1="43" x2="11" y2="53" stroke="#A5D6A7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="43" x2="53" y2="53" stroke="#A5D6A7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="53" y1="43" x2="43" y2="53" stroke="#A5D6A7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center body -->
  <circle cx="32" cy="32" r="9" fill="#FF6D00"/>
  <!-- Camera/cockpit -->
  <circle cx="32" cy="32" r="4.5" fill="#0D47A1"/>
  <circle cx="32" cy="32" r="2.5" fill="#64B5F6"/>
</svg>
